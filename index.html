<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="site-title">Portfolio</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body class="bg-gray-50 text-gray-900 font-sans scroll-smooth">

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="text-center sidebar-profile">
  <div class="profile-wrapper">
    <img id="profile-img" />
  </div>

  <h2 id="site-name" class="sidebar-name"></h2>
  <p class="sidebar-role">Full Stack Developer</p>

  <div id="sidebar-social" class="sidebar-social"></div>
</div>

  <nav id="nav-links">
    <a href="#home" class="nav-link">Home</a>
    <a href="#about" class="nav-link">About</a>
    <a href="#resume" class="nav-link">Resume</a>
    <a href="#portfolio" class="nav-link">Portfolio</a>
    <a href="#contact" class="nav-link">Contact</a>
  </nav>
</aside>

<!-- MOBILE NAVBAR -->
<div id="mobile-nav">

  <div class="mobile-top">

    <div class="mobile-profile">
      <img id="mobile-profile-img" />
      <h4 id="mobile-name"></h4>
    </div>

    <button id="menu-toggle">
      <i class="ri-menu-line"></i>
    </button>

  </div>

  <div id="mobile-menu">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#resume">Resume</a>
    <a href="#portfolio">Portfolio</a>
    <a href="#contact">Contact</a>
  </div>

</div>


<!-- MAIN -->
<main id="main">

<!-- HOME -->
<section id="home">
  <div id="hero-bg"></div>
  <div id="hero-overlay"></div>

  <div class="hero-content text-center">
    <h1 id="hero-name" class="hero-name"></h1>
    <p id="hero-role" class="hero-role"></p>
    <p id="hero-tagline" class="hero-tagline"></p>
    <div id="hero-cta"></div>
  </div>
</section>

<!-- ABOUT -->
<section id="about" class="container" data-aos="fade-up">
  <h2>About</h2>
  <p id="about-text"></p>

  <div class="row align-items-center">
    <div class="col-md-4">
      <img id="about-img" src="assets/profile.jpeg" class="img-fluid rounded"/>
    </div>
    <div class="col-md-8">
      <div id="about-summary"></div>
      <div id="about-details"></div>
    </div>
  </div>
  <h3>Tech Skills</h3>
  <div id="skills" class="mt-4"></div>
</section>

<!-- RESUME -->
<section id="resume" class="container" data-aos="fade-up">

  <h2>Resume</h2>

  <!-- SUMMARY -->
  <p id="summary"></p>

  <!-- EDUCATION SUMMARY + SLIDER -->
  <div class="row align-items-center mt-4">

    <!-- LEFT TEXT -->
    <div class="col-md-6">
      <p id="education-summary"></p>
    </div>

    <!-- RIGHT SLIDER -->
    <div class="col-md-6">
      <div class="edu-slider">
        <div class="slider-track" id="slider-track"></div>
      </div>
    </div>

  </div>

  <!-- EDUCATION -->
  <h3>Education</h3>
  <div id="education"></div>

  <!-- CERT SUMMARY -->
  <p id="certification-summary" class="mt-4"></p>

  <!-- CERTIFICATIONS -->
  <h3>Certifications</h3>
  <div id="certifications"></div>

</section>

<!-- PORTFOLIO -->
<section id="portfolio" class="container" data-aos="fade-up">
  <h2>Projects</h2>
   <p id="projects-summary"></p>
  <div class="row" id="projects"></div>

  <h3>Achievements</h3>
   <p id="achievements-summary"></p>
  <div class="row" id="achievements"></div>
</section>

<!-- CONTACT -->
<section id="contact" class="container" data-aos="fade-up">
  <h2 id="contact-title"></h2>
  <p id="contact-subtitle"></p>
  <p id="contact-desc"></p>

  <div class="row">
    <div class="col-md-6" id="contact-info"></div>

    <div class="col-md-6">
      <iframe id="map-frame" class="w-100 mb-3" height="250"></iframe>
      <div id="contact-form-box"></div>
    </div>
  </div>
</section>

</main>

<!-- Buttons -->
<a id="whatsappBtn">
  <i class="ri-whatsapp-fill"></i>
</a>
<button id="topBtn">↑</button>

<!-- Scripts -->
<script src="script.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
